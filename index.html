<title>鍼灸院 お知らせ・営業日</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/dist/tabler-icons.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root{
    --bg:#fff; --bg2:#f5f4f1; --border:#ecebe6; --border2:#e2e1da;
    --text:#23211d; --text2:#6b6960; --text3:#9b998f;
    --radius:16px; --radius-sm:11px;
    --accent:#cf7d6a; --accent-light:#f7e7e1; --accent-grad:#bf6a57;
    --shadow-card:0 2px 10px rgba(20,20,20,0.04);
    --ng:#c0392b; --ng-bg:#fbecea;
    color-scheme:light;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  @keyframes spin{to{transform:rotate(360deg)}}
  body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif;background:var(--bg2);display:flex;justify-content:center;min-height:100vh;word-break:keep-all;overflow-wrap:break-word;line-break:strict}
  .app{width:100%;max-width:516px;background:var(--bg);min-height:100vh;display:flex;flex-direction:column;position:relative}
  .brand{display:flex;align-items:center;gap:11px;padding:12px 16px;background:#f7e7e1;border-bottom:1.5px solid #f0ddd6}
  .brand-logo{height:42px;width:auto;display:block}
  .brand-name{font-size:19px;font-weight:800;letter-spacing:.02em;color:#bf6a57}
  .hdr{padding:0 16px;border-bottom:1.5px solid var(--border);display:flex;align-items:center;gap:8px;height:62px;background:var(--bg)}
  .hdr-ic{font-size:23px;color:var(--text2)}
  .hdr-title{font-size:20px;font-weight:700;color:var(--text);flex:1}
  .main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:84px}
  .pad{padding:12px}
  .spin{width:18px;height:18px;border:2px solid #fff;border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
  .spin-dark{border-color:var(--accent);border-top-color:transparent}

  /* admin banner */
  .adminbar{background:linear-gradient(135deg,var(--accent),var(--accent-grad));color:#fff;padding:8px 16px;display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600}

  /* bottom nav */
  .bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:516px;border-top:1.5px solid var(--border);display:flex;padding:6px 0 max(12px,env(safe-area-inset-bottom));background:var(--bg);z-index:100}
  .ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:11.4px;color:var(--text3);cursor:pointer;padding:4px 0;transition:color .15s,gap .15s;position:relative}
  .ni.active{color:var(--accent);font-weight:700;gap:5px}
  .ni i{font-size:26px;transition:transform .15s}
  .ni.active i{transform:scale(1.35) translateY(-2px)}

  /* cards */
  .card{background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius);margin-bottom:11px;overflow:hidden;box-shadow:var(--shadow-card)}
  .card-pad{padding:14px}
  .empty{text-align:center;color:var(--text3);font-size:15.6px;padding:48px 16px}
  .empty i{font-size:40px;display:block;margin-bottom:10px;color:var(--border2)}

  /* announcements */
  .ann-card{border:1.5px solid var(--accent);border-radius:var(--radius);margin-bottom:14px;overflow:hidden;background:#fff;box-shadow:0 2px 8px rgba(20,20,20,0.04)}
  .ann-bar{display:flex;align-items:center;gap:9px;padding:9px 14px}
  .ann-d{font-size:20px;font-weight:800;line-height:1;color:var(--text)}
  .ann-dow{font-size:13px;font-weight:700;border-radius:5px;padding:2px 8px;color:#fff}
  .ann-hm{font-size:14px;color:var(--text3);margin-left:auto}
  .ann-body{font-size:16.5px;color:var(--text2);line-height:1.85;white-space:pre-wrap}

  /* FAB */
  .fab{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);margin-left:155px;width:52px;height:52px;border-radius:50%;background:var(--accent);color:#fff;border:none;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(26,26,26,0.3);cursor:pointer;z-index:90}
  .fab i{font-size:30px}

  /* calendar */
  .cal-head{display:flex;align-items:center;justify-content:space-between;padding:4px 4px 14px}
  .cal-nav{width:36px;height:36px;border-radius:18px;border:none;background:var(--accent-light);color:var(--accent);font-size:21px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .cal-month{font-size:19px;font-weight:700}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
  .cal-dow{text-align:center;font-size:13px;font-weight:600;padding:4px 0}
  .cal-day{aspect-ratio:1;border-radius:12px;border:1.5px solid transparent;font-size:16px;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text);position:relative;background:none}
  .cal-mark{font-size:13px;font-weight:800;line-height:1;margin-top:2px}

  /* form / settings */
  .f-label{display:block;font-size:15px;font-weight:600;color:var(--text);margin:14px 0 6px}
  .f-input{width:100%;font-size:18px;padding:11px 13px;border-radius:var(--radius-sm);border:1.5px solid var(--border2);background:#fff;color:var(--text);font-family:inherit}
  #li-user::placeholder{text-transform:none}
  .f-input:focus{outline:none;border-color:var(--accent)}
  textarea.f-input{resize:vertical;min-height:100px}
  .pass-wrap{position:relative;display:block}
  .pass-wrap .f-input{padding-right:44px;box-sizing:border-box}
  .pass-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text3);font-size:21px;padding:4px;line-height:1}
  .submit-btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);padding:13px;font-size:18px;font-weight:600;cursor:pointer;margin-top:18px}
  .ghost-btn{width:100%;background:none;border:1.5px solid var(--border2);border-radius:var(--radius);padding:12px;font-size:16.8px;color:var(--text2);cursor:pointer;margin-top:10px}
  .danger-btn{width:100%;background:none;border:1.5px solid #f3c4bf;border-radius:var(--radius);padding:12px;font-size:16.8px;color:var(--ng);cursor:pointer;margin-top:10px}
  .prof-row{display:flex;align-items:center;gap:12px;padding:15px 16px;border-bottom:1.5px solid var(--border)}
  .prof-row:last-child{border-bottom:none}
  .prof-k{font-size:14px;color:var(--text3);width:96px;flex-shrink:0}
  .prof-v{flex:1;min-width:0;font-size:18px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .mini-btn{background:var(--accent);color:#fff;border:none;border-radius:9px;padding:7px 16px;font-size:15px;font-weight:600;cursor:pointer;flex-shrink:0}
  .set-row{display:flex;align-items:center;gap:12px;padding:14px;border-bottom:1.5px solid var(--border)}
  .set-row:last-child{border-bottom:none}
  .set-ic{width:38px;height:38px;border-radius:11px;background:var(--accent-light);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
  .set-label{font-size:16.8px;font-weight:600;flex:1}
  .set-val{font-size:14px;color:var(--text3)}

  /* login */
  .login-wrap{padding:36px 24px 24px;text-align:center}
  .login-ic{width:72px;height:72px;border-radius:20px;background:var(--accent-light);color:var(--accent);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:40px}
  .login-title{font-size:22px;font-weight:700;margin-bottom:6px}
  .login-sub{font-size:15px;color:var(--text2);line-height:1.7;margin-bottom:22px}
  .err-msg{font-size:15px;color:var(--ng);margin-top:10px;min-height:18px}

  /* sheet */
  .sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
  .sheet{width:100%;max-width:400px;background:#fff;border-radius:22px;padding:22px 18px;max-height:84vh;overflow-y:auto;box-shadow:0 12px 40px rgba(0,0,0,0.25)}
  .sheet-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .sheet-t{font-size:20px;font-weight:700}
  .sheet-x{width:30px;height:30px;border-radius:15px;background:var(--bg2);border:none;font-size:18px;color:var(--text2);cursor:pointer}

  /* toast */
  .toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:300;background:rgba(35,33,29,0.95);color:#fff;padding:14px 26px;border-radius:14px;font-size:16.8px;font-weight:600;box-shadow:0 8px 30px rgba(0,0,0,0.3);text-align:center;max-width:80%}
  .toast-undo{display:flex;align-items:center;gap:14px;padding:12px 12px 12px 20px;text-align:left}

  .cfg{padding:48px 24px;text-align:center}
  .cfg i{font-size:48px;color:var(--text3)}
  .slotwrap{display:flex;flex-direction:column;gap:8px}
  .slot{display:flex;align-items:center;gap:12px;padding:13px 14px;border:1.5px solid var(--border);border-radius:14px;background:#fff}
  .slot-t{font-size:19px;font-weight:700;font-variant-numeric:tabular-nums}
  .slot-sub{font-size:13px;color:var(--text3);margin-top:2px}
  .slot-mk{margin-left:auto;font-size:24px;font-weight:800}
  .chip{display:inline-flex;align-items:center;gap:6px;background:#f7e7e1;color:#a85a48;border-radius:18px;padding:6px 8px 6px 13px;font-size:16px;font-weight:700;font-variant-numeric:tabular-nums}
  .chip button{background:none;border:none;color:#bf6a57;cursor:pointer;font-size:13px;line-height:1;padding:3px 4px}
  .cal-day:disabled{cursor:default}
</style>
</head>

<script>
/* ============================================================
   Supabase（新規プロジェクト）の値に書き換えてください
   ============================================================ */
const SUPABASE_URL = 'https://hhaybexmbocfiepleiaa.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_JuQbmnqnf-ERoucaskCCYg_qQaNRd4P';
const FAKE_DOMAIN = 'clinic-admin.local'; // 管理者ID → メール変換用（実際には送信されません）
// ▼ 公式LINEのID（LINE公式アカウントマネージャー → 設定 で確認できる @から始まるID）
const LINE_ID = '@572psbse';
/* ============================================================ */

let sb, session=null, adminId='', curTab='ann';

// 管理者モード判定：URLに「admin」が含まれていれば管理者用（設定タブを表示）。
// 患者用URL = そのまま / 管理者用URL = 末尾に #admin を付ける。
// ↓この合言葉を変えれば管理者用URLの印を変更できます（例: 'kanri' にすると #kanri）。
const ADMIN_KEYWORD = 'admin';
const ADMIN_MODE = (location.hash + location.search).toLowerCase().includes(ADMIN_KEYWORD);

const $ = (id)=>document.getElementById(id);
const iso = (d)=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const TODAY = iso(new Date());
const MONTHS=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
const DOW=['日','月','火','水','木','金','土'];
const isAdmin=()=>ADMIN_MODE && !!session;
const canEdit=()=>ADMIN_MODE && !!session; // 編集ボタンは管理者URL＋ログイン時のみ

// 営業状態の表示設定
const BIZ={
  open:  {mark:'○', label:'営業',     col:'#1f9d55', bg:'#e7f6ee'},
  am:    {mark:'△', label:'午前のみ', col:'#2563eb', bg:'#e8f1fd'},
  pm:    {mark:'□', label:'午後のみ', col:'#d97706', bg:'#fef3c7'},
  closed:{mark:'×', label:'休み',     col:'#c0392b', bg:'#fbecea'},
};
const bizOf=(s)=>BIZ[s]||BIZ.open;

function toast(msg){ const t=document.createElement('div'); t.className='toast'; t.textContent=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),2200); }
function undoToast(msg, onUndo){
  document.querySelectorAll('.toast').forEach(el=>el.remove());
  const t=document.createElement('div');
  t.className='toast toast-undo';
  t.innerHTML=`<span style="flex:1">${msg}</span><button style="background:rgba(255,255,255,0.15);border:none;color:#fff;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;padding:7px 12px;border-radius:8px;white-space:nowrap;flex-shrink:0">元に戻す</button>`;
  t.querySelector('button').onclick=()=>{ t.remove(); onUndo(); };
  document.body.appendChild(t);
  setTimeout(()=>{ if(t.parentNode) t.remove(); },6000);
}
function esc(s){ return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtLong(s){ const d=new Date(s+'T00:00:00'); return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日(${DOW[d.getDay()]})`; }
function linkify(escaped){
  return (escaped||'').replace(/https?:\/\/[^\s<]+/g,(url)=>{
    let trail=''; const m=url.match(/[)\].,、。！？!?]+$/);
    if(m){ trail=m[0]; url=url.slice(0,-m[0].length); }
    return `<a href="${url}" target="_blank" rel="noopener noreferrer" style="color:var(--accent);text-decoration:underline;word-break:break-all">${url}</a>${trail}`;
  });
}
function togglePass(inputId, iconId){
  const inp=$(inputId), ic=$(iconId); if(!inp||!ic) return;
  const show=inp.type==='password';
  inp.type=show?'text':'password';
  ic.className='ti '+(show?'ti-eye-off':'ti-eye');
}
const userToEmail=(u)=>`${u.toLowerCase()}@${FAKE_DOMAIN}`;

/* ---------- 初期化 ---------- */
if(!SUPABASE_URL.startsWith('https://') || SUPABASE_URL.includes('ここに') || SUPABASE_ANON_KEY.length<20 || SUPABASE_ANON_KEY.includes('ここに')){
  $('loading').style.display='none'; $('cfg-error').style.display='block';
}else{
  sb=window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  init();
}
async function init(){
  const { data:{ session:s } } = await sb.auth.getSession();
  setSession(s);
  await loadAppSettings();
  ['loading','cfg-error'].forEach(id=>$(id).style.display='none');
  $('app-main').style.display='flex';
  if(!ADMIN_MODE) $('ni-admin').style.display='none'; // 患者用URLでは管理タブを隠す
  go('biz');
  checkNewsDot(); // お知らせ未読チェック
  loadPendings(); // 未処理予約チェック（管理者のみ）
}

/* ---------- お知らせ未読ドット ---------- */
const NEWS_SEEN_KEY = 'uryu_news_seen_at';
function getNewsSeenAt(){ try{ return localStorage.getItem(NEWS_SEEN_KEY)||''; }catch(e){ return ''; } }
function setNewsSeenAt(ts){ try{ localStorage.setItem(NEWS_SEEN_KEY, ts); }catch(e){} }
async function checkNewsDot(){
  try{
    const seenAt=getNewsSeenAt();
    const { data } = await sb.from('news').select('created_at').eq('published',true);
    if(!data||!data.length) return;
    const unread=seenAt ? data.filter(a=>a.created_at>seenAt).length : data.length;
    updateNewsBadge(unread);
  }catch(e){}
}
function updateNewsBadge(count){
  const badge=$('ni-ann-badge');
  if(!badge) return;
  if(count<=0){ badge.style.display='none'; return; }
  badge.textContent=count>99?'99+':String(count);
  badge.style.display='inline-block';
}
function markNewsSeen(){
  setNewsSeenAt(new Date().toISOString());
  updateNewsBadge(0);
}
function setSession(s){
  session=s||null;
  adminId = session ? (session.user.email||'').split('@')[0] : '';
  $('admin-bar').style.display = (ADMIN_MODE && session) ? 'flex' : 'none';
  $('admin-warn-bar').style.display = (ADMIN_MODE && !session) ? 'flex' : 'none';
  if(ADMIN_MODE && session && typeof loadPendings==='function') loadPendings();
}

/* ---------- タブ切替 ---------- */
function go(tab){
  if(tab==='admin' && !ADMIN_MODE) tab='ann';
  if(sheetDirty && $('sheet-bg')){
    const dest=tab;
    const origSave=sheetSaveFn;
    const bg=document.createElement('div'); bg.className='sheet-bg'; bg.id='dirty-bg';
    bg.style.zIndex='3001';
    const saveBtn=origSave?`<button class="submit-btn" id="dc-save" style="margin:0 0 8px">保存する</button>`:'';
    bg.innerHTML=`<div class="sheet" style="max-width:320px;text-align:center">
      <div style="font-size:17px;font-weight:700;margin:4px 0 6px">変更が保存されていません</div>
      <div style="font-size:14px;color:var(--text2);margin-bottom:18px">この画面を閉じますか？</div>
      ${saveBtn}
      <button class="ghost-btn" id="dc-discard" style="margin:0 0 8px;color:var(--ng);font-weight:700">保存せず切り替える</button>
      <button class="ghost-btn" id="dc-back" style="margin:0">戻る</button>
    </div>`;
    document.body.appendChild(bg);
    if(origSave) $('dc-save').onclick=()=>{ bg.remove(); origSave(); };
    $('dc-discard').onclick=()=>{ bg.remove(); closeSheet(true); _go(dest); };
    $('dc-back').onclick=()=>bg.remove();
    return;
  }
  closeSheet(true);
  _go(tab);
}
function _go(tab){
  curTab=tab;
  ['ann','biz','admin'].forEach(t=>$('ni-'+t).classList.toggle('active',t===tab));
  const meta={ ann:['ti-speakerphone','お知らせ'], biz:['ti-calendar-event','営業日'], admin:['ti-settings','設定'] }[tab];
  $('hdr-ic').className='ti '+meta[0]+' hdr-ic';
  $('hdr-t').textContent=meta[1];
  const helpBtn=$('hdr-help'); if(helpBtn) helpBtn.style.display=(tab==='biz'&&!isAdmin())?'inline-flex':'none';
  const old=document.querySelector('.fab'); if(old) old.remove();
  if(tab==='ann'){ annView='latest'; annPastOpen=false; markNewsSeen(); renderAnn(); }
  else if(tab==='biz'){ const n=new Date(); bz.y=n.getFullYear(); bz.m=n.getMonth(); bz.sel=null; bz.selSlot=null; renderBiz(); }
  else renderAdmin();
  if(isAdmin()) loadPendings();
}

function annCard(a){
  const d=new Date(a.created_at);
  const mo=d.getMonth()+1, day=d.getDate(), dow=DOW[d.getDay()];
  const hm=`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  const pinned=!!a.pinned, draft=!a.published;
  const border=pinned?'#d9a441':'var(--accent)';
  const barBg=pinned?'#fdf4e0':'var(--accent-light)';
  const pillBg=pinned?'#d9a441':'var(--accent)';
  let admin='';
  if(canEdit()){
    const btn=(fn,icon,title,extra='')=>`<button onclick="${fn}" title="${title}" style="background:none;border:none;cursor:pointer;color:var(--text3);padding:6px;display:flex;align-items:center;${extra}"><i class="ti ${icon}" style="font-size:22px"></i></button>`;
    admin = btn(`toggleAnnPin('${a.id}',${!pinned})`, 'ti-pin', pinned?'固定解除':'固定', pinned?'color:#c08a2e':'')
          + btn(`openAnnSheet('${a.id}')`, 'ti-pencil', '編集')
          + btn(`delAnn('${a.id}')`, 'ti-trash', '削除');
  }
  return `<div class="ann-card" style="border-color:${border}">
    <div class="ann-bar" style="background:${barBg}">
      <span class="ann-d">${mo}/${day}</span>
      <span class="ann-dow" style="background:${pillBg}">${dow}</span>
      ${pinned?`<span class="ann-dow" style="background:${pillBg}"><i class="ti ti-pin-filled" style="font-size:12px;vertical-align:-1px"></i> 固定</span>`:''}
      ${draft?`<span class="ann-dow" style="background:#9b998f">非公開</span>`:''}
      <span class="ann-hm">${hm}</span>${admin}
    </div>
    <div style="padding:14px 16px">
      <div style="text-align:center">
        <span style="font-size:20px;font-weight:800;color:var(--text);line-height:1.5;word-break:break-all">${esc(a.title)}</span>
        <span style="display:block;height:3px;background:${border};border-radius:2px;margin-top:8px;max-width:60%;margin-left:auto;margin-right:auto"></span>
      </div>
      ${(a.body||a.url)?`<div style="border-top:1px solid var(--border);margin-top:12px;padding-top:12px"></div>`:''}
      ${a.body?`<div class="ann-body">${linkify(esc(a.body))}</div>`:''}
      ${a.url?`<div style="margin-top:${a.body?'12px':'0'}"><a href="${esc(a.url)}" target="_blank" rel="noopener noreferrer" style="display:flex;align-items:center;justify-content:center;gap:6px;background:var(--accent-light);color:#a85a48;font-weight:700;font-size:16px;padding:12px;border-radius:14px;text-decoration:none">ページを開く<i class="ti ti-external-link" style="font-size:18px"></i></a></div>`:''}
    </div>
  </div>`;
}
let annView='latest', annPastOpen=false, ANN_CACHE=[];
async function renderAnn(){
  $('view').innerHTML='<div class="pad" style="text-align:center;padding:40px"><span class="spin spin-dark"></span></div>';
  const { data } = await sb.from('news').select('*')
    .order('pinned',{ascending:false}).order('created_at',{ascending:false});
  if(curTab!=='ann') return;
  ANN_CACHE=data||[];
  drawAnn();
  if(canEdit()){
    const fab=document.createElement('button');
    fab.className='fab'; fab.innerHTML='<i class="ti ti-plus"></i>';
    fab.onclick=()=>openAnnSheet(); document.body.appendChild(fab);
  }
}
function drawAnn(){
  if(curTab!=='ann') return;
  const all=ANN_CACHE;
  let html='<div class="pad">';
  html+='<div style="display:flex;gap:6px;background:var(--bg2);border-radius:14px;padding:4px;margin-bottom:14px">';
  [['latest','最新'],['all','すべて']].forEach(([k,label])=>{
    const on=annView===k;
    html+=`<button onclick="setAnnView('${k}')" style="flex:1;padding:9px;border-radius:10px;border:none;font-size:16px;font-weight:700;cursor:pointer;background:${on?'#fff':'transparent'};color:${on?'var(--accent)':'var(--text2)'};box-shadow:${on?'0 1px 3px rgba(0,0,0,.08)':'none'}">${label}</button>`;
  });
  html+='</div>';
  if(!all.length){
    html+='<div class="empty"><i class="ti ti-speakerphone"></i>お知らせはまだありません</div></div>';
    $('view').innerHTML=html; return;
  }
  if(annView==='latest'){
    const newest=all.slice().sort((a,b)=>new Date(b.created_at)-new Date(a.created_at))[0];
    if(!newest) html+='<div class="empty" style="padding:36px 0">お知らせはまだありません</div>';
    else html+=annCard(newest);
  }else{
    const pinned=all.filter(a=>a.pinned);
    const normal=all.filter(a=>!a.pinned);
    const now=new Date();
    const monthFirst=new Date(now.getFullYear(),now.getMonth(),1).getTime();
    const recent=normal.filter(a=>new Date(a.created_at).getTime()>=monthFirst);
    const past=normal.filter(a=>new Date(a.created_at).getTime()<monthFirst);
    pinned.forEach(a=>html+=annCard(a));
    recent.forEach(a=>html+=annCard(a));
    if(past.length){
      html+=`<button onclick="toggleAnnPast()" style="width:100%;padding:12px;margin:6px 0 12px;font-size:15px;font-weight:600;color:var(--accent);background:var(--accent-light);border:none;border-radius:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px"><i class="ti ti-history"></i> 過去のお知らせを見る（${past.length}件）<i class="ti ti-chevron-${annPastOpen?'up':'down'}"></i></button>`;
      if(annPastOpen) past.forEach(a=>html+=annCard(a));
    }
    if(!pinned.length && !recent.length && !past.length) html+='<div class="empty" style="padding:36px 0">お知らせはありません</div>';
  }
  html+='</div>';
  $('view').innerHTML=html;
}
function setAnnView(k){ annView=k; annPastOpen=false; drawAnn(); }
function toggleAnnPast(){ annPastOpen=!annPastOpen; drawAnn(); }
let editingAnnId=null;

    <label class="f-label">本文 <span style="color:var(--text3);font-size:13px">（任意）</span></label>
    <textarea class="f-input" id="an-body" placeholder="内容を入力...">${a&&a.body?esc(a.body):''}</textarea>
    <label class="f-label">リンクURL <span style="color:var(--text3);font-size:13px">（任意）</span></label>
    <input class="f-input" id="an-url" placeholder="https://..." value="${a&&a.url?esc(a.url):''}" autocapitalize="none" autocorrect="off" spellcheck="false"/>
    <div style="font-size:12.5px;color:var(--text3);margin-top:6px;line-height:1.6">入力すると本文の下に「（リンク）」と表示され、押すとそのページが開きます。</div>
    <label style="display:flex;align-items:center;gap:8px;margin-top:14px;font-size:16.8px;cursor:pointer">
      <input type="checkbox" id="an-pin" ${a&&a.pinned?'checked':''} style="width:18px;height:18px"/> 上部に固定する
    </label>
    <label style="display:flex;align-items:center;gap:8px;margin-top:10px;font-size:16.8px;cursor:pointer">
      <input type="checkbox" id="an-pub" ${(!a||a.published)?'checked':''} style="width:18px;height:18px"/> 公開する（外すと下書き）
    </label>
    <button class="submit-btn" id="an-save" onclick="saveAnn()">${a?'保存する':'投稿する'}</button>
  `);
}
async function saveAnn(){
  const title=$('an-title').value.trim();
  if(!title){ toast('タイトルを入力してください'); return; }
  const body=$('an-body').value.trim()||null;
  let url=$('an-url').value.trim();
  if(url && !/^https?:\/\//i.test(url)) url='https://'+url;
  if(!url) url=null;
  const pinned=$('an-pin').checked;
  const published=$('an-pub').checked;
  $('an-save').innerHTML='<span class="spin"></span>';
  let error;
  if(editingAnnId){
    ({ error } = await sb.from('news').update({ title, body, url, pinned, published }).eq('id',editingAnnId));
  }else{
    ({ error } = await sb.from('news').insert({ title, body, url, pinned, published }));
  }
  if(error){ toast('保存に失敗しました'); const b=$('an-save'); if(b) b.textContent=editingAnnId?'保存する':'投稿する'; return; }
  editingAnnId=null; closeSheet(); toast('保存しました'); renderAnn();
}
async function toggleAnnPin(id,pin){
  const { error } = await sb.from('news').update({pinned:pin}).eq('id',id);
  if(error){ toast('変更に失敗しました'); return; }
  toast(pin?'上に固定しました':'固定を解除しました'); renderAnn();
}
function delAnn(id){
  confirmDialog('このお知らせを削除しますか？', async ()=>{
    const { error } = await sb.from('news').delete().eq('id',id);
    if(error){ toast('削除に失敗しました'); return; }
    toast('削除しました'); renderAnn();
  }, '削除する', 'やめる');
}

/* ============================================================
   営業日（予約：1枠1人 / 患者は閲覧・管理者が代理予約）
   ============================================================ */
const DOWFULL=['日曜','月曜','火曜','水曜','木曜','金曜','土曜'];
let APP={ slot_minutes:60, publish_until:'' };
let bz={ y:new Date().getFullYear(), m:new Date().getMonth(), wd:{}, biz:{}, sel:null, selSlot:null, resv:{} };

async function loadAppSettings(){
  try{
    const { data } = await sb.from('app_settings').select('slot_minutes,publish_until').eq('id',1).maybeSingle();
    if(data && data.slot_minutes) APP.slot_minutes=data.slot_minutes;
    if(data && data.publish_until) APP.publish_until=data.publish_until||'';
  }catch(e){}
}
function toSlots(v){
  // 新形式: [{t:"10:00",min:60}, ...] / 旧形式: ["10:00",...] の両方を読む
  let arr=[];
  if(Array.isArray(v)) arr=v;
  else if(typeof v==='string'){ try{ arr=JSON.parse(v); }catch(_){ arr=[]; } }
  return arr.map(x=>{
    if(typeof x==='object' && x!==null && x.t) return { t:String(x.t).slice(0,5), min:Number(x.min)||APP.slot_minutes||60 };
    return { t:String(x).slice(0,5), min:APP.slot_minutes||60 };
  });
}
function slotTimes(slots){ return [...slots].sort((a,b)=>a.t.localeCompare(b.t)); }
function durLabel(m){ return `${m}分`; }
function addMin(hhmm, mins){
  const [h,m]=hhmm.split(':').map(Number);
  let t=(h*60+m+mins); t=((t%1440)+1440)%1440;
  return String(Math.floor(t/60)).padStart(2,'0')+':'+String(t%60).padStart(2,'0');
}
function slotPast(ds,t){
  if(ds<TODAY) return true;
  if(ds>TODAY) return false;
  const [h,m]=t.split(':').map(Number);
  const now=new Date();
  return (h*60+m) <= (now.getHours()*60+now.getMinutes());
}
async function loadBizMonth(){
  const { data:wd } = await sb.from('weekly_defaults').select('*');
  bz.wd={}; (wd||[]).forEach(w=>bz.wd[w.dow]={ is_open:!!w.is_open, slots:toSlots(w.slots) });
  const start=`${bz.y}-${String(bz.m+1).padStart(2,'0')}-01`;
  const last=new Date(bz.y,bz.m+1,0).getDate();
  const end=`${bz.y}-${String(bz.m+1).padStart(2,'0')}-${String(last).padStart(2,'0')}`;
  const { data:bd } = await sb.from('business_days').select('*').gte('date',start).lte('date',end);
  bz.biz={}; (bd||[]).forEach(b=>bz.biz[b.date]={ is_open:!!b.is_open, slots:(b.slots==null?null:toSlots(b.slots)), note:b.note });
  await loadAppSettings();
}
function effDay(ds){
  const dow=new Date(ds+'T00:00:00').getDay();
  const base=bz.wd[dow]||{is_open:false,slots:[]};
  const ov=bz.biz[ds];
  let is_open, slots, note=null, override=false;
  if(ov){ override=true; is_open=ov.is_open; slots=(ov.slots!=null)?ov.slots:(base.slots||[]); note=ov.note||null; }
  else { is_open=base.is_open; slots=base.slots||[]; }
  slots=slotTimes([...(slots||[])]);
  return { open:is_open && slots.length>0, is_open, slots, note, override };
}
async function renderBiz(){
  $('view').innerHTML='<div class="pad" style="text-align:center;padding:40px"><span class="spin spin-dark"></span></div>';
  await loadBizMonth();
  if(curTab!=='biz') return;
  if(!bz.sel) bz.sel=autoSelectDay();
  drawBiz();
  if(bz.sel) await selectDay(bz.sel);
}
function autoSelectDay(){
  // 患者用かつ未公開月はどの日も選択しない
  const ym=`${bz.y}-${String(bz.m+1).padStart(2,'0')}`;
  if(!isAdmin() && APP.publish_until && ym > APP.publish_until) return null;
  const days=new Date(bz.y,bz.m+1,0).getDate();
  const inThisMonth=(Number(TODAY.slice(0,4))===bz.y && Number(TODAY.slice(5,7))===bz.m+1);
  const startDay=inThisMonth?Number(TODAY.slice(8,10)):1;
  for(let day=startDay;day<=days;day++){
    const ds=`${bz.y}-${String(bz.m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    if(effDay(ds).open) return ds;
  }
  return null;
}
function drawBiz(){
  const firstDow=new Date(bz.y,bz.m,1).getDay();
  const days=new Date(bz.y,bz.m+1,0).getDate();
  // 公開月チェック：患者は publish_until 超の月は「未定」表示
  const ym=`${bz.y}-${String(bz.m+1).padStart(2,'0')}`;
  const hidden = !isAdmin() && APP.publish_until && ym > APP.publish_until;
  const unpublishedForAdmin = isAdmin() && APP.publish_until && ym > APP.publish_until;
  let cal='';
  DOW.forEach((d,i)=>cal+=`<div class="cal-dow" style="color:${i===0?'#e2483d':i===6?'#3b82f6':'var(--text3)'}">${d}</div>`);
  if(hidden){
    // 未定月：全マス「-」で塗る
    for(let i=0;i<firstDow;i++) cal+='<div></div>';
    for(let day=1;day<=days;day++){
      const wd=new Date(bz.y,bz.m,day).getDay();
      const wcol=wd===0?'#e2483d':wd===6?'#3b82f6':'var(--text3)';
      cal+=`<button class="cal-day" disabled style="color:${wcol};opacity:.5">-</button>`;
    }
  } else {
    for(let i=0;i<firstDow;i++) cal+='<div></div>';
    for(let day=1;day<=days;day++){
      const ds=`${bz.y}-${String(bz.m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      const e=effDay(ds);
      const wd=new Date(bz.y,bz.m,day).getDay();
      const wcol=wd===0?'#e2483d':wd===6?'#3b82f6':'var(--text)';
      const past=ds<TODAY;
      const sel=bz.sel===ds;
      const selectable = e.open && (!past || isAdmin());
      let style='', sub='';
      if(e.open){
        style += past ? 'background:#f3f1ee;color:#bcb9b1;' : `background:#f7e7e1;color:${wcol};`;
      } else {
        style += 'color:'+(past?'#cbc8c1':'#b9b6ae')+';';
        sub=`<span style="font-size:9.6px;font-weight:700;color:${past?'#cfccc4':'#c0392b'};line-height:1;margin-top:1px">休</span>`;
      }
      if(sel) style += 'background:var(--accent);color:#fff;box-shadow:0 3px 10px rgba(207,125,106,.4);transform:scale(1.1);font-weight:800;z-index:2;';
      const dot=e.override?`<span style="position:absolute;top:3px;right:4px;width:5px;height:5px;border-radius:50%;background:${sel?'#fff':'var(--accent)'}"></span>`:'';
      cal+=`<button class="cal-day" ${selectable?'':'disabled'} onclick="${selectable?`selectDay('${ds}')`:''}" style="${style}position:relative;transition:transform .12s">${day}${sub}${dot}</button>`;
    }
  }
  $('view').innerHTML=`<div class="pad">
    <div class="card card-pad">
      <div class="cal-head">
        <button class="cal-nav" onclick="moveBiz(-1)"><i class="ti ti-chevron-left"></i></button>
        <span class="cal-month">${bz.y}年 ${MONTHS[bz.m]}</span>
        <button class="cal-nav" onclick="moveBiz(1)"><i class="ti ti-chevron-right"></i></button>
      </div>
      <div class="cal-grid">${cal}</div>
      ${unpublishedForAdmin?`<div style="display:flex;align-items:flex-start;gap:8px;background:#E1F5EE;border:1.5px solid #1D9E75;border-radius:8px;padding:9px 11px;margin-top:12px"><i class="ti ti-info-circle" style="font-size:17px;color:#085041;flex-shrink:0;margin-top:1px"></i><span style="font-size:13px;color:#085041;font-weight:700;line-height:1.5">患者には未公開の月です</span></div>`:''}
      ${hidden ? `<div style="text-align:center;font-size:13.5px;color:var(--text3);margin-top:12px">この月の営業日は未定です</div>` : `<div style="display:flex;gap:16px;justify-content:center;margin-top:14px">
        <span style="font-size:13.5px;color:var(--text2)"><span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:#f7e7e1;vertical-align:-1px;margin-right:5px"></span>営業日</span>
        <span style="font-size:13.5px;color:var(--text2)"><span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:#f3f1ee;border:1px solid #e2e1da;vertical-align:-1px;margin-right:5px"></span>休業日</span>
      </div>`}
    </div>
    <div id="slot-panel"></div>
  </div>`;
}
function moveBiz(d){ let m=bz.m+d,y=bz.y; if(m<0){m=11;y--;} if(m>11){m=0;y++;} bz.m=m;bz.y=y;bz.sel=null; renderBiz(); }
async function selectDay(ds){
  bz.sel=ds; bz.selSlot=null;
  let resv={};
  if(isAdmin()){
    const { data } = await sb.from('reservations').select('id,date,time,name,visit_count,category,note,status').eq('date',ds).eq('status','confirmed');
    (data||[]).forEach(r=>{ resv[String(r.time).slice(0,5)]={id:r.id,name:r.name,visit_count:r.visit_count,category:r.category||'normal',note:r.note||''}; });
  }else{
    const { data } = await sb.from('reservations').select('date,time,status').eq('date',ds).eq('status','confirmed');
    (data||[]).forEach(r=>{ resv[String(r.time).slice(0,5)]={taken:true}; });
  }
  bz.resv=resv;
  drawBiz();
  drawSlotPanel(ds);
}
const CATEGORY_LABEL={ normal:'通常', student:'学生', trial:'体験' };
function categoryBadge(cat){
  const lbl=CATEGORY_LABEL[cat]||'通常';
  const color = cat==='student' ? '#2563eb' : cat==='trial' ? '#16a34a' : 'var(--text3)';
  return `<span style="font-size:11.5px;font-weight:700;color:${color};border:1px solid ${color};border-radius:6px;padding:1px 6px">${lbl}</span>`;
}
function resvSubLine(r){
  const noHtml = (r.visit_count!=null&&r.visit_count!=='') ? `<span style="color:var(--text3)">${esc(String(r.visit_count))}回目</span>` : '';
  const line1 = `<div style="display:flex;align-items:center;gap:8px;margin-bottom:2px">${categoryBadge(r.category)}${noHtml}</div>`;
  const line2 = `<div style="font-size:16px;font-weight:700;color:var(--text)">${esc(r.name||'')} 様</div>`;
  const line3 = r.note ? `<div style="color:var(--text3);font-size:13px;margin-top:2px">${esc(r.note)}</div>` : '';
  return line1 + line2 + line3;
}
function drawSlotPanel(ds){
  const panel=$('slot-panel'); if(!panel) return;
  const e=effDay(ds);
  const admin=isAdmin();
  const hasPending = admin && (pendings||[]).some(p=>p.date===ds);

let patientHistory=null; // 全履歴（日付降順）
// 名前・基準日を渡すと「基準日より前の直近予約」を返す
const norm=(s)=>String(s||'').replace(/[\s\u3000]/g,'');
function getHistBefore(name, beforeDate){
  if(!patientHistory) return null;
  const key=norm(name);
  // beforeDate より前（または同日）の中で最も新しいもの
  const hits=patientHistory.filter(r=>norm(r.name)===key && r.date<=beforeDate);
  return hits.length ? hits[0] : null; // 降順なので先頭が最新
}
async function loadPatientHistory(){
  if(patientHistory) return;
  try{
    const { data } = await sb.from('reservations')
      .select('name,visit_count,category,date,note')
      .eq('status','confirmed')
      .order('date',{ascending:false})
      .limit(2000);
    patientHistory=data||[];
  }catch(e){ patientHistory=[]; }
}
function bkSuggest(q){
  const box=$('bk-suggest'); if(!box) return;
  q=(q||'').trim();
  if(!q || !patientHistory || !patientHistory.length){ box.style.display='none'; box.innerHTML=''; return; }
  const nq=q.replace(/[\s\u3000]/g,'');
  // 名前で絞り込み、各名前の最新1件だけ代表として表示
  const seen=new Set(); const repHits=[];
  (patientHistory||[]).forEach(r=>{
    const k=norm(r.name);
    if(k.includes(nq) && !seen.has(k)){ seen.add(k); repHits.push(r); }
  });
  const hits=repHits.slice(0,5);
  if(!hits.length){ box.style.display='none'; box.innerHTML=''; return; }
  box.innerHTML=hits.map(p=>{
    const nextCount=p.visit_count!=null?p.visit_count+1:'';
    const sub=[p.visit_count!=null?`前回${p.visit_count}回目`:null, CATEGORY_LABEL[p.category]||null].filter(Boolean).join('・');
    return `<div onclick="bkPickPatient('${esc(p.name).replace(/'/g,"\\'")}',${p.visit_count!=null?p.visit_count:'null'},'${p.category}')" style="padding:11px 13px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;align-items:center;gap:8px">
      <i class="ti ti-user" style="font-size:16px;color:var(--text3)"></i>
      <div style="flex:1;min-width:0"><div style="font-size:15px;font-weight:700;color:var(--text)">${esc(p.name)}</div>${sub?`<div style="font-size:12px;color:var(--text3)">${sub}</div>`:''}</div>
      ${nextCount!==''?`<span style="font-size:12px;color:var(--accent);font-weight:700;white-space:nowrap">→ ${nextCount}回目</span>`:''}
    </div>`;
  }).join('');
  box.style.display='flex';
}
function bkPickPatient(name, lastCount, category){
  const n=$('bk-name'); if(n) n.value=name;
  const c=$('bk-chart'); if(c && lastCount!=null) c.value=lastCount+1;
  if(category) selectCategory('bk-cat', category);
  const box=$('bk-suggest'); if(box){ box.style.display='none'; box.innerHTML=''; }
  // 前回のメモがあればチェックボックスを表示
  const p=(patientHistory||[]).find(x=>norm(x.name)===norm(name));
  const pmWrap=$('bk-prevmemo-wrap');
  if(pmWrap){
    if(p && p.note){
      bkPrevMemo=p.note;
      pmWrap.innerHTML=chkRowHtml('bk-prevmemo-chk', `前回のメモ（${esc(p.note)}）`, false, 'bkTogglePrevMemo()');
      pmWrap.style.display='block';
    }else{
      bkPrevMemo=''; pmWrap.style.display='none'; pmWrap.innerHTML='';
    }
  }
}
let bkPrevMemo='';
function chkRowHtml(id, label, on, onclick){

    <span id="${id}" data-on="${on?'1':'0'}" style="width:20px;height:20px;border-radius:6px;border:2px solid ${on?'var(--accent)':'#c8c6be'};background:${on?'var(--accent)':'#fff'};display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff;font-size:13px">${on?'<i class=\"ti ti-check\"></i>':''}</span>

/* ---------- 設定：通常営業日設定（営業/休業＋枠＋施術時間） ---------- */
let WK={};
function hourOpts(sel){ let s=''; for(let h=6;h<=23;h++){ const v=String(h).padStart(2,'0'); s+=`<option value="${v}"${v===sel?' selected':''}>${v}</option>`; } return s; }
function minOpts(sel){ let s=''; for(let m=0;m<=55;m+=5){ const v=String(m).padStart(2,'0'); s+=`<option value="${v}"${v===sel?' selected':''}>${v}</option>`; } return s; }
function durMOpts5(sel){ let s=''; for(let m=5;m<=180;m+=5){ s+=`<option value="${m}"${Number(sel)===m?' selected':''}>${m}分</option>`; } return s; }
function toMin(t){ const[h,m]=t.split(':').map(Number); return h*60+m; }
function checkOverlap(slots, newT, newMin){
  // 新しい枠の開始・終了（分）
  const ns=toMin(newT), ne=ns+newMin;
  for(const s of slots){
    const ss=toMin(s.t), se=ss+s.min;
    // 既存枠と時間が重なるか
    if(ns<se && ne>ss) return s;
  }
  return null;
}
async function openWeekly(){
  const { data } = await sb.from('weekly_defaults').select('*');
  bz.wd={}; (data||[]).forEach(w=>bz.wd[w.dow]={ is_open:!!w.is_open, slots:toSlots(w.slots) });
  WK={};
  for(let dow=0;dow<=6;dow++){ const w=bz.wd[dow]||{slots:[]}; WK[dow]=[...(w.slots||[])]; }
  let h='';
  for(const dow of [1,2,3,4,5,6,0]) h+=weekdayCard(dow);
  h+='<button class="submit-btn" id="wk-save" onclick="saveWeekly()">基準を保存する</button>';
  sheet('通常営業日設定', h, { dirty:false, onSave:saveWeekly });
}
function weekdayCard(dow){
  const w=bz.wd[dow]||{is_open:false};
  const open=!!w.is_open;
  return `<div style="border:1.5px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:12px">
    <div style="display:flex;align-items:center;justify-content:space-between;background:var(--bg2);padding:11px 14px">
      <span style="font-size:18px;font-weight:700;color:${dow===0?'#c0392b':dow===6?'#2563eb':'var(--text)'}">${DOWFULL[dow]}</span>
      <label style="display:flex;align-items:center;gap:6px;font-size:15px;cursor:pointer"><input type="checkbox" id="wk-open-${dow}" ${open?'checked':''} onchange="toggleWkOpen(${dow})" style="width:17px;height:17px"/> 営業</label>
    </div>
    <div id="wk-fields-${dow}" style="padding:13px 14px;${open?'':'display:none'}">
      <div id="wk-chips-${dow}" style="display:flex;flex-direction:column;gap:8px;margin-bottom:11px">${wkChipsHtml(dow)}</div>
      <div style="font-size:13px;font-weight:700;color:var(--text2);margin-bottom:6px">枠を追加</div>
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:8px">
        <span style="font-size:13px;color:var(--text3)">開始</span>
        <select id="wk-h-${dow}" class="f-input" style="flex:1;min-width:60px;margin:0">${hourOpts('10')}</select>
        <span style="font-size:13px;color:var(--text3)">時</span>
        <select id="wk-mi-${dow}" class="f-input" style="flex:1;min-width:60px;margin:0">${minOpts('00')}</select>
        <span style="font-size:13px;color:var(--text3)">分</span>
      </div>
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:10px">
        <span style="font-size:13px;color:var(--text3)">施術</span>
        <select id="wk-dm-${dow}" class="f-input" style="flex:2;margin:0">${durMOpts5(60)}</select>
      </div>
      <button class="mini-btn" style="width:100%;padding:11px" onclick="addWkSlot(${dow})">この枠を追加</button>
    </div>
  </div>`;
}
function wkChipsHtml(dow){
  const arr=[...(WK[dow]||[])].sort((a,b)=>a.t.localeCompare(b.t));
  if(!arr.length) return '<span style="font-size:13.5px;color:var(--text3)">枠がありません</span>';
  return arr.map(s=>`<div style="display:flex;align-items:center;background:var(--accent-light);border-radius:10px;padding:8px 12px;gap:10px">
    <span style="font-size:15px;font-weight:700;flex:1">${s.t} 〜 ${addMin(s.t,s.min)} <span style="font-size:12px;color:var(--text3);font-weight:400">（${durLabel(s.min)}）</span></span>
    <button onclick="removeWkSlot(${dow},'${s.t}')" style="background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;padding:0 4px">✕</button>
  </div>`).join('');
}
function toggleWkOpen(dow){ const on=$('wk-open-'+dow).checked; $('wk-fields-'+dow).style.display=on?'block':'none'; markDirty(); }
function addWkSlot(dow){
  const t=`${$('wk-h-'+dow).value}:${$('wk-mi-'+dow).value}`;
  if(!/^([01]\d|2[0-3]):[0-5]\d$/.test(t)){ toast('時刻が正しくありません'); return; }
  const min=parseInt($('wk-dm-'+dow).value,10)||0;
  if(min<=0){ toast('施術時間を設定してください'); return; }
  // 同じ開始時刻の枠は上書き前に除外してチェック
  const existing=(WK[dow]||[]).filter(s=>s.t!==t);
  const conflict=checkOverlap(existing, t, min);
  if(conflict){
    const end=addMin(conflict.t, conflict.min);
    toast(`${conflict.t}〜${end}の枠と重なります`); return;
  }
  WK[dow]=existing;
  WK[dow].push({t,min});
  WK[dow].sort((a,b)=>a.t.localeCompare(b.t));
  $('wk-chips-'+dow).innerHTML=wkChipsHtml(dow);
  markDirty();
}
function removeWkSlot(dow,t){ WK[dow]=(WK[dow]||[]).filter(x=>x.t!==t); $('wk-chips-'+dow).innerHTML=wkChipsHtml(dow); markDirty(); }

    rows.push({ dow, is_open:open, slots: open ? [...(WK[dow]||[])].sort((a,b)=>a.t.localeCompare(b.t)) : [], updated_at:new Date().toISOString() });

}

function ocEff(ds){

  const b=$('do-save'); if(b) b.innerHTML='<span class="spin"></span>';
  const payload={ date:ds, is_open:DAYEDIT.is_open, slots: DAYEDIT.is_open ? [...toSlots(DAYEDIT.slots)].sort((a,b)=>a.t.localeCompare(b.t)) : [], updated_at:new Date().toISOString() };
  const { error } = await sb.from('business_days').upsert(payload,{onConflict:'date'});
  if(error){ toast('保存に失敗しました'); if(b) b.textContent='この日を保存'; return; }
  sheetDirty=false; toast('保存しました'); openOverrideCalendar();
}
async function resetDayOverride(){
  const ds=DAYEDIT.ds;
  const { error } = await sb.from('business_days').delete().eq('date',ds);
  if(error){ toast('解除に失敗しました'); return; }
  toast('基準に戻しました'); openOverrideCalendar();
}

let pendings=[]; let pendingCount=0;
async function loadPendings(){
  if(!isAdmin()){ pendings=[]; pendingCount=0; return; }
  try{
    const { data } = await sb.from('reservations')
      .select('id,date,time,name,note,created_at')
      .eq('status','pending')
      .order('created_at',{ascending:false});
    pendings=data||[];
  }catch(e){ pendings=[]; }
  pendingCount=pendings.length;
  updatePendingBadge();
}
function updatePendingBadge(){
  const ni=$('ni-admin'); if(!ni) return;
  let b=$('ni-admin-badge');
  if(!b){
    const ic=ni.querySelector('i');
    if(!ic) return;
    const wrap=document.createElement('div');
    wrap.style.cssText='position:relative;display:inline-block';
    ic.parentNode.insertBefore(wrap, ic); wrap.appendChild(ic);
    b=document.createElement('span'); b.id='ni-admin-badge';
    b.style.cssText='display:none;position:absolute;top:-6px;right:-14px;min-width:18px;height:18px;border-radius:9px;background:#e03e2d;color:#fff;font-size:10px;font-weight:700;line-height:18px;text-align:center;padding:0 5px;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,sans-serif';
    wrap.appendChild(b);
  }
  if(pendingCount>0){ b.textContent=pendingCount>99?'99+':String(pendingCount); b.style.display='inline-block'; }
  else b.style.display='none';
}
function parsePendingNote(note){
  try{ const j=JSON.parse(note); return {g:j.g||'', a:j.a||'', s:j.s||''}; }catch(e){ return {g:'',a:'',s:note||''}; }
}
function agoLabel(ts){
  const diff=Date.now()-new Date(ts).getTime();
  const min=Math.floor(diff/60000);
  if(min<60) return {t:`${Math.max(min,1)}分前`, old:false};
  const h=Math.floor(min/60);
  if(h<24) return {t:`${h}時間前`, old:false};
  const d=Math.floor(h/24);
  return {t:d===1?'昨日':`${d}日前`, old:true};
}

function pcToggle(key){
  pcState.chk[key]=toggleChk('pc-chk-'+key);
  pcComposeMemo();
}
function pcComposeMemo(){
  const info=pcState.info;
  const parts=[];
  if(pcState.chk.pm && pcState.prevMemo) parts.push(pcState.prevMemo);
  if(pcState.chk.g && info.g) parts.push(GENDER_LABEL[info.g]||info.g);
  if(pcState.chk.a && info.a) parts.push(info.a+'歳');
  if(pcState.chk.s && info.s) parts.push(info.s);
  const note=$('pc-note'); if(note) note.value=parts.join('\n');
}
async function pcConfirm(){
  const name=($('pc-name').value||'').trim();
  if(!name){ $('pc-err').textContent='お名前を入力してください'; return; }
  const vcRaw=($('pc-chart').value||'').trim();
  const visit_count=vcRaw?parseInt(vcRaw,10):null;
  const category=($('pc-cat-group').dataset.selected)||'normal';
  const note=($('pc-note').value||'').trim()||null;
  $('pc-save').innerHTML='<span class="spin"></span>';
  // 枠の重複チェック
  const { data:dup } = await sb.from('reservations').select('id').eq('date',pcState.ds).eq('time',pcState.t).eq('status','confirmed').limit(1);
  if(dup && dup.length){ $('pc-err').textContent='この枠には既に確定済みの予約があります'; $('pc-save').textContent='この内容で予約を確定する'; return; }
  const { error } = await sb.from('reservations').update({ name, visit_count, category, note, status:'confirmed' }).eq('id',pcState.id);
  if(error){
    const m=(error.message||'');
    if(m.includes('duplicate')||m.includes('23505')) $('pc-err').textContent='この枠には既に確定済みの予約があります';
    else $('pc-err').textContent='確定できませんでした';
    $('pc-save').textContent='この内容で予約を確定する'; return;
  }
  // この予約日より後の同名予約の回数を+1ずつ更新
  if(visit_count!=null){
    try{
      const { data:futureList } = await sb.from('reservations')
        .select('id,visit_count,date').eq('name',name).eq('status','confirmed')
        .gt('date', pcState.ds).order('date',{ascending:true});
      if(futureList && futureList.length){
        let next=visit_count+1;
        for(const f of futureList){
          await sb.from('reservations').update({visit_count:next}).eq('id',f.id);
          next++;
        }
      }
    }catch(e){}
  }
  patientHistory=null;
  toast('予約を確定しました');
  await loadPendings();
  openPendingList();
}
function pcCancel(){
  confirmDialog('この未処理予約をキャンセルにしますか？', async ()=>{
    const { error } = await sb.from('reservations').update({status:'cancelled'}).eq('id',pcState.id);
    if(error){ toast('キャンセルできませんでした'); return; }
    toast('キャンセルにしました');
    await loadPendings();
    openPendingList();
  }, 'キャンセルにする', 'やめる');
}

/* ---------- 予約一覧 ---------- */
async function openResvList(y, m){
  const now=new Date();
  const rlY = y || now.getFullYear();
  const rlM = m || now.getMonth()+1;
  let yopts='', mopts='';
  for(let y=now.getFullYear()-1;y<=now.getFullYear()+2;y++) yopts+=`<option value="${y}"${y===rlY?' selected':''}>${y}</option>`;
  for(let m=1;m<=12;m++) mopts+=`<option value="${m}"${m===rlM?' selected':''}>${m}月</option>`;
  sheet('予約一覧',`
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:14px">
      <select class="f-input" id="rl-y" style="flex:1;margin:0" onchange="resvListLoad()">${yopts}</select>
      <span style="font-size:14px;color:var(--text3)">年</span>
      <select class="f-input" id="rl-m" style="flex:1;margin:0" onchange="resvListLoad()">${mopts}</select>
    </div>
    <div id="rl-body"><div style="text-align:center;padding:32px"><span class="spin spin-dark"></span></div></div>
  `);
  await resvListLoad();
}
async function resvListLoad(){
  const yEl=$('rl-y'), mEl=$('rl-m');
  if(!yEl||!mEl) return;
  const y=Number(yEl.value), m=Number(mEl.value);
  const start=`${y}-${String(m).padStart(2,'0')}-01`;
  const last=new Date(y,m,0).getDate();
  const end=`${y}-${String(m).padStart(2,'0')}-${String(last).padStart(2,'0')}`;
  const body=$('rl-body'); if(!body) return;
  body.innerHTML='<div style="text-align:center;padding:32px"><span class="spin spin-dark"></span></div>';
  const { data } = await sb.from('reservations')
    .select('id,date,time,name,visit_count,category,note')
    .eq('status','confirmed')
    .gte('date',start).lte('date',end)
    .order('date').order('time');
  if(!$('rl-body')) return;
  const rows=data||[];
  if(!rows.length){ body.innerHTML='<div style="text-align:center;padding:32px;color:var(--text3);font-size:15px">この月の予約はありません</div>'; return; }
  const byDate={};
  rows.forEach(r=>{ if(!byDate[r.date]) byDate[r.date]=[]; byDate[r.date].push(r); });
  const DOW_LBL=['日','月','火','水','木','金','土'];
  const DOW_COL=['#c0392b','#5F5E5A','#5F5E5A','#5F5E5A','#5F5E5A','#5F5E5A','#2563eb'];
  const CAT_COLOR={ normal:'color:#5F5E5A;border-color:#c8c6be', student:'color:#185FA5;border-color:#85B7EB', trial:'color:#3B6D11;border-color:#97C459' };
  let html=`<div style="display:flex;align-items:center;gap:10px;background:var(--accent-light);border:1.5px solid var(--accent);border-radius:11px;padding:10px 14px;margin-bottom:14px">
    <i class="ti ti-calendar-check" style="font-size:22px;color:var(--accent)"></i>
    <span style="font-size:13px;color:var(--text3);flex:1">${m}月の予約合計</span>
    <span style="font-size:22px;font-weight:800;color:var(--accent)">${rows.length}</span><span style="font-size:13px;color:var(--text3);margin-left:2px">件</span>
  </div>`;
  Object.keys(byDate).sort().forEach(ds=>{
    const d=new Date(ds+'T00:00:00');
    const dow=d.getDay();
    const mo=d.getMonth()+1, day=d.getDate();
    html+=`<div style="margin-bottom:14px">
      <div style="display:flex;align-items:center;padding:7px 10px;background:#f7e7e1;border:1.5px solid #cf7d6a;border-radius:10px;margin-bottom:6px">
        <span style="font-size:15px;font-weight:700;color:var(--text);flex:1">${mo}月${day}日</span>
        <span style="font-size:12px;font-weight:700;color:#fff;background:${DOW_COL[dow]};border-radius:5px;padding:2px 7px;margin-right:6px">${DOW_LBL[dow]}</span>
        <span style="font-size:12px;font-weight:600;color:var(--text3);background:var(--border);border-radius:20px;padding:2px 9px">${byDate[ds].length}件</span>
      </div>`;
    byDate[ds].forEach(r=>{
      const t=String(r.time).slice(0,5);
      const end=addMin(t, APP.slot_minutes);
      const cat=r.category||'normal';
      const catStyle=CAT_COLOR[cat]||CAT_COLOR.normal;
      const catLabel=(CATEGORY_LABEL[cat]||'通常');
      const countHtml=r.visit_count!=null?`<span style="font-size:12px;color:var(--text3)">${r.visit_count}回目</span>`:'';
      const noteHtml=r.note?`<div style="font-size:12px;color:var(--text3);margin-top:2px">${esc(r.note)}</div>`:'';
      html+=`<div class="slot" style="border-color:#e2e1da;background:#fff">
        <div style="flex:1;min-width:0">
          <div class="slot-t">${t}<span style="font-size:13.5px;color:var(--text3);font-weight:400"> 〜 ${end}</span></div>
          <div class="slot-sub">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:2px"><span style="font-size:11.5px;font-weight:700;${catStyle};border:1px solid;border-radius:6px;padding:1px 6px">${catLabel}</span>${countHtml}</div>
            <div style="font-size:16px;font-weight:700;color:var(--text)">${esc(r.name)} 様</div>
            ${noteHtml}
          </div>
        </div>
        <div style="display:flex;gap:6px;align-items:center;flex-shrink:0;margin-left:8px">
          <button onclick="rlEditBooking('${r.id}','${ds}','${t}','${esc(r.name)}',${r.visit_count!=null?r.visit_count:'null'},'${r.category||'normal'}','${esc(r.note||'')}')" style="background:var(--accent-light);border:1.5px solid var(--accent);color:var(--accent);border-radius:9px;padding:6px 11px;font-size:13px;font-weight:700;cursor:pointer"><i class="ti ti-edit" style="font-size:14px;vertical-align:-2px"></i> 編集</button>
          <button onclick="rlCancelBooking('${r.id}','${esc(r.name)}')" style="background:none;border:1.5px solid #ddd;color:var(--text3);border-radius:9px;padding:6px 11px;font-size:13px;font-weight:700;cursor:pointer"><i class="ti ti-x" style="font-size:14px;vertical-align:-2px"></i></button>
        </div>
      </div>`;
    });
    html+='</div>';
  });
  body.innerHTML=html;
}

async function rlSaveEdit(id, ds){
  const name=($('rle-name').value||'').trim();
  if(!name){ $('rle-err').textContent='お名前を入力してください'; return; }
  const vcRaw=($('rle-chart').value||'').trim();
  const visit_count=vcRaw?parseInt(vcRaw,10):null;
  const category=($('rle-cat-group').dataset.selected)||'normal';
  const note=($('rle-note').value||'').trim()||null;
  $('rle-save').innerHTML='<span class="spin"></span>';
  const { error } = await sb.from('reservations').update({name,visit_count,category,note}).eq('id',id);
  if(error){ toast('保存に失敗しました'); $('rle-save').textContent='保存する'; return; }
  toast('更新しました'); openResvList();
}
function rlCancelBooking(id, name){
  confirmDialog(`${esc(name)} 様の予約を削除しますか？`, async ()=>{
    const { error } = await sb.from('reservations').update({status:'cancelled'}).eq('id',id);
    if(error){ toast('削除に失敗しました'); return; }
    undoToast('削除しました', async ()=>{
      const { error:e2 } = await sb.from('reservations').update({status:'confirmed'}).eq('id',id);
      if(e2){ toast('復元できませんでした（枠が埋まっている可能性）'); return; }
      toast('元に戻しました'); patientHistory=null; resvListLoad();
    });
    patientHistory=null;
    resvListLoad();
  }, '削除する', 'やめる');
}

async function savePass(){

/* ---------- ID変更（Edge Function 必要：未デプロイ時は案内） ---------- */
function openEditId(){
  sheet('IDの変更', `
    <label class="f-label">新しいID（半角英数字4文字以上・小文字）</label>
    <input class="f-input" id="ep-id" value="${esc(adminId)}" autocapitalize="none" autocorrect="off" spellcheck="false" style="text-transform:lowercase"/>
    <label class="f-label">パスワード（確認のため）</label>
    <div class="pass-wrap"><input class="f-input" id="ep-id-pass" type="password" placeholder="現在のパスワード"/><button class="pass-eye" onclick="togglePass('ep-id-pass','ep-id-pass-ic')" tabindex="-1"><i id="ep-id-pass-ic" class="ti ti-eye"></i></button></div>
    <div style="font-size:13px;color:var(--text3);margin-top:8px;line-height:1.6">※ ID変更は、初回のみサーバー側の関数（change-username）のデプロイが必要です。デプロイ後はこの画面から変更できます。</div>
    <button class="submit-btn" id="ep-id-save" onclick="saveId()">変更する</button>
  `);
}
async function saveId(){
  const raw=$('ep-id').value.trim(), newId=raw.toLowerCase(), pass=$('ep-id-pass').value;
  if(!/^[a-z0-9]{4,}$/.test(newId)){ toast('IDは半角英数字（小文字）4文字以上'); return; }
  if(!pass){ toast('確認のためパスワードを入力してください'); return; }
  if(newId===adminId){ toast('現在と同じIDです'); return; }
  $('ep-id-save').innerHTML='<span class="spin"></span>';
  const { error:authErr } = await sb.auth.signInWithPassword({ email:userToEmail(adminId), password:pass });
  if(authErr){ toast('パスワードが違います'); $('ep-id-save').textContent='変更する'; return; }
  const { data:{ session:s } } = await sb.auth.getSession();
  if(!s){ toast('ログインの有効期限が切れました。ログインし直してください'); $('ep-id-save').textContent='変更する'; return; }
  try{
    const res = await fetch(`${SUPABASE_URL}/functions/v1/change-username-ts`, {
      method:'POST',
      headers:{ 'Content-Type':'text/plain' },
      body:JSON.stringify({ newUsername:newId, token:s.access_token })
    });
    const j=await res.json().catch(()=>({error:'通信に失敗しました'}));
    if(!res.ok||j.error){ toast(j.error||'IDの変更に失敗しました'); $('ep-id-save').textContent='変更する'; return; }
  }catch(e){
    toast('関数に接続できませんでした（Verify JWTのオフを確認してください）');
    $('ep-id-save').textContent='変更する'; return;
  }
  adminId=newId; closeSheet(); toast('IDを変更しました'); renderAdmin();
}

/* ---------- シート / 確認ダイアログ ---------- */
let sheetDirty=false, sheetSaveFn=null, sheetTitle='';
function sheet(title, body, { dirty=false, onSave=null }={}){
  closeSheet(true);
  sheetDirty=dirty; sheetSaveFn=onSave; sheetTitle=title;
  const bg=document.createElement('div'); bg.className='sheet-bg'; bg.id='sheet-bg';
  bg.onclick=(e)=>{ if(e.target===bg) tryCloseSheet(); };
  bg.innerHTML=`<div class="sheet"><div class="sheet-h"><div class="sheet-t">${title}</div><button class="sheet-x" onclick="tryCloseSheet()">✕</button></div><div id="sheet-body">${body}</div></div>`;
  document.body.appendChild(bg);
}
function markDirty(){ sheetDirty=true; }
function tryCloseSheet(){
  if(!sheetDirty){ closeSheet(true); return; }
  // 確認ダイアログを出す
  const bg=document.createElement('div'); bg.className='sheet-bg'; bg.id='dirty-bg';
  bg.style.zIndex='3001';
  const saveBtn=sheetSaveFn?`<button class="submit-btn" id="dc-save" style="margin:0 0 8px">保存する</button>`:'';
  bg.innerHTML=`<div class="sheet" style="max-width:320px;text-align:center">
    <div style="font-size:17px;font-weight:700;margin:4px 0 6px">変更が保存されていません</div>
    <div style="font-size:14px;color:var(--text2);margin-bottom:18px">この画面を閉じますか？</div>
    ${saveBtn}
    <button class="ghost-btn" id="dc-discard" style="margin:0 0 8px;color:var(--ng);font-weight:700">保存せず閉じる</button>
    <button class="ghost-btn" id="dc-back" style="margin:0">戻る</button>
  </div>`;
  document.body.appendChild(bg);
  if(sheetSaveFn){ $('dc-save').onclick=()=>{ bg.remove(); sheetSaveFn(); }; }
  $('dc-discard').onclick=()=>{ bg.remove(); closeSheet(true); };
  $('dc-back').onclick=()=>bg.remove();
}
function closeSheet(force=false){
  const db=$('dirty-bg'); if(db) db.remove();
  const s=$('sheet-bg');
  if(!s) return;
  if(!force && sheetDirty){ tryCloseSheet(); return; }
  sheetDirty=false; sheetSaveFn=null;
  s.remove();
}
function setSheetBody(html){ const b=$('sheet-body'); if(b) b.innerHTML=html; }
function confirmDialog(message, onYes, yesLabel='はい', noLabel='キャンセル'){
  const bg=document.createElement('div'); bg.className='sheet-bg'; bg.id='confirm-bg';
  bg.onclick=(e)=>{ if(e.target===bg) bg.remove(); };
  bg.innerHTML=`<div class="sheet" style="max-width:320px;text-align:center">
    <div style="font-size:18px;font-weight:600;line-height:1.6;margin:8px 0 20px">${message}</div>
    <button class="submit-btn" id="cf-yes" style="margin:0 0 8px;background:var(--ng)">${yesLabel}</button>
    <button class="ghost-btn" id="cf-no" style="margin:0">${noLabel}</button>
  </div>`;
  document.body.appendChild(bg);
  $('cf-yes').onclick=()=>{ bg.remove(); onYes(); };
  $('cf-no').onclick=()=>bg.remove();
}
</script>
</body>
</html>
